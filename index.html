<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Judul di Tab Browser -->
  <title>LHM - SD Yaumi Fatimah</title>

  <!-- Favicon menggunakan image.png (Sesuai pengaturan awal Anda) -->
  <link rel="icon" type="image/png" href="image.png">
  <link rel="apple-touch-icon" href="image.png">
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* 1. Animasi Ripple Logo (Lingkaran 1:1) */
    @keyframes ripple-pulse {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .ripple-ring {
      position: absolute;
      border-radius: 50%;
      animation: ripple-pulse 3s cubic-bezier(0.1, 0.7, 1, 0.1) infinite;
    }

    /* 2. Animasi Spinning Border untuk Search Bar */
    @keyframes spin-border {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spin-container {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent 40%, var(--glow-color) 100%);
      animation: spin-border 15s linear infinite;
      z-index: 0;
    }

    /* 3. Latar Kartu Transparan Pelangi Pastel */
    @keyframes water-flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .floating-rainbow-water {
      background-color: rgba(255, 255, 255, 0.7);
      background-image: linear-gradient(135deg,
        rgba(252, 165, 165, 0.2) 0%,
        rgba(253, 224, 71, 0.15) 20%,
        rgba(134, 239, 172, 0.2) 40%,
        rgba(147, 197, 253, 0.2) 60%,
        rgba(196, 181, 253, 0.2) 80%,
        rgba(252, 165, 165, 0.2) 100%
      );
      background-size: 150% 150%;
      animation: water-flow 35s ease-in-out infinite;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.8);
    }

    /* 4. Cahaya Emas Luar Kartu */
    @keyframes golden-glow {
      0%, 100% { box-shadow: 0 0 10px 0 rgba(250, 204, 21, 0); }
      50% { box-shadow: 0 0 25px 8px rgba(250, 204, 21, 0.3); }
    }
    .golden-aura {
      animation: golden-glow 12s ease-in-out infinite;
    }

    /* 5. Animasi Angka Melompat Soft */
    @keyframes soft-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .soft-bounce {
      animation: soft-bounce 3.5s ease-in-out infinite;
    }

    /* 6. Animasi Zoom Out Saat Kartu Diklik */
    .animate-zoom-out {
      animation: zoom-into-screen 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      z-index: 50;
    }
    @keyframes zoom-into-screen {
      0% { transform: scale(1); opacity: 1; }
      20% { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(2.8); opacity: 0; }
    }

    /* 7. Background Gradasi Pelangi untuk Logo */
    .rainbow-bg {
      background: linear-gradient(135deg, 
        #ff9a9e 0%, 
        #fecfef 20%, 
        #fdfbfb 40%, 
        #e2ebf0 60%, 
        #a1c4fd 80%, 
        #c2e9fb 100%
      );
    }
  </style>
</head>
<body class="relative min-h-screen font-sans text-slate-800 bg-slate-50 overflow-x-hidden">

  <!-- CANVAS BACKGROUND PARTIKEL GEOMETRIS -->
  <canvas id="bgCanvas" class="fixed inset-0 z-0 pointer-events-none" style="width: 100vw; height: 100vh;"></canvas>

  <!-- CONTENT LAYER -->
  <div class="relative z-10 max-w-6xl mx-auto py-16 px-4 sm:px-6 lg:px-8">

    <!-- HEADER SECTION -->
    <div class="text-center mb-16 flex flex-col items-center mt-8">
      
      <!-- LOGO HALAMAN menggunakan logo.png -->
      <div class="relative flex justify-center items-center mb-8 w-32 h-32">
        <div class="ripple-ring w-full h-full border-2 border-sky-400" style="animation-delay: 0s;"></div>
        <div class="ripple-ring w-full h-full border-2 border-pink-400" style="animation-delay: 1s;"></div>
        <div class="ripple-ring w-full h-full border-2 border-amber-400" style="animation-delay: 2s;"></div>

        <div class="relative z-10 w-full h-full rainbow-bg p-2 rounded-full shadow-lg border-2 border-white flex items-center justify-center">
          <img src="logo.png" alt="Logo SD Yaumi Fatimah Kudus" class="w-full h-full object-contain rounded-full" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        </div>
      </div>

      <h1 class="text-5xl font-extrabold tracking-tight sm:text-6xl text-slate-800 drop-shadow-sm mb-2">
        Laporan Akademik
      </h1>
      <p class="mt-2 text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-500 via-indigo-500 to-pink-500 tracking-widest uppercase">
        SD Yaumi Fatimah Kudus
      </p>
    </div>

    <!-- SEARCH BAR SECTION -->
    <div class="max-w-2xl mx-auto mb-16">
      <div class="relative group overflow-hidden rounded-2xl p-[3px] shadow-md hover:shadow-lg transition-shadow duration-300">
        <div class="spin-container opacity-60 group-focus-within:opacity-100 transition-opacity duration-500" style="--glow-color: #0ea5e9;"></div>

        <div class="relative z-10 flex items-center bg-white rounded-[13px] w-full h-full">
          <div class="pl-5 flex items-center pointer-events-none">
            <svg class="h-6 w-6 text-slate-400 group-focus-within:text-sky-600 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input
            id="searchInput"
            type="text"
            class="block w-full pl-4 pr-5 py-4 bg-transparent border-none text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-0 font-semibold text-lg"
            placeholder="Cari kelas..."
          />
        </div>
      </div>
    </div>

    <!-- GRID CARDS SECTION -->
    <div id="cardGrid" class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3">
      <!-- Kartu-kartu akan di-render secara otomatis oleh JavaScript -->
    </div>

    <!-- FOOTER -->
    <div class="mt-24 text-center text-sm font-semibold tracking-widest text-slate-400 relative z-10">
      <p>&copy; <span id="year"></span> SD YAUMI FATIMAH KUDUS</p>
    </div>

  </div>

  <script>
    // 1. DATA KELAS
    const classData = [
      { id: '1', name: 'Kelas 1', link: 'https://docs.google.com/spreadsheets/d/1ni-fA-2z6sDIjOV0WojK3KjOnBk2D9mvwqCSLbMVhqU/edit?usp=sharing', color: 'from-sky-400 to-blue-600', hex: '#0284c7', label: '1' },
      { id: '2a', name: 'Kelas 2A', link: 'https://docs.google.com/spreadsheets/d/1ZRQk2OniU9a6py1JlNlgvKRnQlnu74XvD4oGf5mDc30/edit?usp=sharing', color: 'from-pink-400 to-rose-600', hex: '#be123c', label: '2A' },
      { id: '2b', name: 'Kelas 2B', link: 'https://docs.google.com/spreadsheets/d/1mPPXLgRUi3udMbkSyEwJJha857IRQqXQNEVvhGG1Bxo/edit?usp=sharing', color: 'from-purple-400 to-fuchsia-600', hex: '#a21caf', label: '2B' },
      { id: '3', name: 'Kelas 3', link: 'https://docs.google.com/spreadsheets/d/1-xj70IwyCD5YAvnf2Icimu4D6qRsp-zdL2mnDFRvwRI/edit?usp=sharing', color: 'from-emerald-400 to-green-600', hex: '#15803d', label: '3' },
      { id: '4', name: 'Kelas 4', link: 'https://docs.google.com/spreadsheets/d/1cv2W0S-0XZPJMoS_XqNlnowChGp9wODd0SCdxIu9bek/edit?usp=sharing', color: 'from-amber-400 to-orange-600', hex: '#c2410c', label: '4' },
      { id: '5', name: 'Kelas 5', link: 'https://docs.google.com/spreadsheets/d/1CTR3F1mqzcTMYppMJH68id3lM8T5ofMPfPCmhPUVMk4/edit?usp=sharing', color: 'from-indigo-400 to-blue-700', hex: '#3730a3', label: '5' },
      { id: '6', name: 'Kelas 6', link: 'https://docs.google.com/spreadsheets/d/13ylW9o1lZ79WoFyeZqngrmbZCYXvey7L5LOnzni03oc/edit?usp=sharing', color: 'from-red-400 to-red-600', hex: '#b91c1c', label: '6' }
    ];

    document.getElementById('year').textContent = new Date().getFullYear();

    // 2. RENDER KARTU KELAS
    const cardGrid = document.getElementById('cardGrid');
    const searchInput = document.getElementById('searchInput');

    function renderCards(filterText = '') {
      cardGrid.innerHTML = '';
      const filtered = classData.filter(c => c.name.toLowerCase().includes(filterText.toLowerCase()));

      if (filtered.length === 0) {
        cardGrid.innerHTML = `<div class="col-span-full text-center py-20 relative z-10"><p class="text-slate-500 text-lg font-medium">Kelas tidak ditemukan.</p></div>`;
        return;
      }

      filtered.forEach((cls, index) => {
        const card = document.createElement('a');
        card.href = cls.link;
        // rounded-[24px] mengatasi bug sudut melancip di luar
        card.className = `group relative rounded-[24px] block transition-transform duration-500 hover:shadow-xl golden-aura hover:-translate-y-2 p-[3.5px]`;
        card.style.animationDelay = `-${index * 2.7}s`;
        card.style.backgroundColor = cls.hex;

        card.innerHTML = `
          <div class="relative h-full w-full rounded-[20.5px] floating-rainbow-water p-8 flex flex-col justify-between z-10 border border-white/60" style="animation-delay: -${index * 5.3}s">
            <div>
              <div class="flex justify-between items-start mb-6">
                <div class="soft-bounce" style="animation-delay: -${index * 1.2}s">
                  <div class="w-16 h-16 rounded-full bg-gradient-to-br ${cls.color} flex items-center justify-center shadow-lg border-2 border-white/80 z-10 transform group-hover:scale-110 group-hover:-rotate-6 transition-transform duration-500">
                    <span class="text-white font-black text-2xl tracking-tighter drop-shadow-md">${cls.label}</span>
                  </div>
                </div>
              </div>
              <h3 class="text-2xl font-extrabold text-slate-800 mb-2 group-hover:text-blue-600 transition-colors duration-300">${cls.name}</h3>
              <p class="text-slate-600 font-medium text-sm">LHM, Rekap Nilai, Tahfidz, Tahsin & Grafik Akademik</p>
            </div>
            <div class="mt-8 flex items-center text-sm font-bold text-sky-600 group-hover:text-sky-500 transition-colors duration-300">
              Buka Spreadsheet
              <svg class="ml-2 h-4 w-4 transform group-hover:translate-x-2 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
              </svg>
            </div>
          </div>
        `;

        // NAVIGASI DI TAB YANG SAMA UNTUK MENGHEMAT MEMORI HP
        card.addEventListener('click', (e) => {
          e.preventDefault();
          card.classList.add('animate-zoom-out');
          setTimeout(() => {
            window.location.href = cls.link;
          }, 1100);
        });

        cardGrid.appendChild(card);
      });
    }

    searchInput.addEventListener('input', (e) => renderCards(e.target.value));
    renderCards();

    // 3. CANVAS PARTIKEL BACKGROUND
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#38bdf8', '#818cf8', '#34d399', '#fbbf24', '#f472b6'];
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.size = Math.random() * 10 + 5;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.shape = Math.floor(Math.random() * 3);
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotationSpeed;

        if (this.x < -50) this.x = canvas.width + 50;
        if (this.x > canvas.width + 50) this.x = -50;
        if (this.y < -50) this.y = canvas.height + 50;
        if (this.y > canvas.height + 50) this.y = -50;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = this.color;

        ctx.beginPath();
        if (this.shape === 0) {
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        } else if (this.shape === 1) {
          ctx.moveTo(0, -this.size);
          ctx.lineTo(this.size, this.size);
          ctx.lineTo(-this.size, this.size);
        } else {
          ctx.rect(-this.size, -this.size, this.size * 2, this.size * 2);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        for (let j = 0; j < particles.length; j++) {
          const p2 = particles[j];
          if (this === p2) continue;
          const dx = this.x - p2.x;
          const dy = this.y - p2.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 150) {
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = 0.05 * (1 - (distance / 150));
            ctx.lineWidth = 1;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            ctx.globalAlpha = 1.0;
          }
        }
      }
    }

    for (let i = 0; i < 40; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
